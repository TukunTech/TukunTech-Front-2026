<app-auth-layout>
  <div class="register-plan-container">

    <div class="register-plan-header">
      <h1>{{ 'registerPlan.title' | translate }}</h1>
      <p>{{ 'registerPlan.subtitle' | translate }}</p>
    </div>

    <div class="plan-options">

      <button
        class="plan-option-card"
        type="button"
        *ngFor="let plan of plans"
        (click)="choosePlan(plan.id)"
      >
        <div class="plan-option-content">
          <div
            class="plan-option-icon"
            [class.plan-option-icon--blue]="plan.tone === 'blue'"
            [class.plan-option-icon--green]="plan.tone === 'green'"
          >
            <i [class]="plan.icon"></i>
          </div>

          <div>
            <h2>{{ plan.titleKey | translate }}</h2>
            <p>{{ plan.descriptionKey | translate }}</p>
          </div>
        </div>

        <span class="plan-option-price">
          <span>{{ 'registerPlan.initialPayment' | translate }}: ${{ plan.initialPrice }}</span>
          <strong>{{ 'registerPlan.monthlyPayment' | translate }}: ${{ plan.monthlyPrice }}/mo</strong>
        </span>
      </button>

    </div>

    <p class="sign-in-text">
      {{ 'registerPlan.alreadyHaveAccount' | translate }}
      <button type="button" (click)="goToLogin()">
        {{ 'registerPlan.signIn' | translate }}
      </button>
    </p>

  </div>
</app-auth-layout>
