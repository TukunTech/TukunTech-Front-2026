<app-auth-layout>

  <div class="welcome-container">

    <div class="welcome-header">
      <h1>{{ 'welcome.title' | translate }}</h1>
      <p>{{ 'welcome.subtitle' | translate }}</p>
    </div>

    <div class="roles-container">

      <button
        class="role-card"
        (click)="goToLogin()"
      >
        <div class="role-card__left">

          <div class="role-icon role-icon--blue">
            <i class="bi bi-person-heart role-icon-symbol"></i>
          </div>

          <div>
            <h2>{{ 'welcome.memberTitle' | translate }}</h2>
            <p>{{ 'welcome.memberDescription' | translate }}</p>
          </div>

        </div>

        <span class="role-arrow">→</span>
      </button>

      <button
        class="role-card"
        (click)="goToLogin('admin')"
      >
        <div class="role-card__left">

          <div class="role-icon role-icon--green">
            <i class="bi bi-shield role-icon-symbol"></i>
          </div>

          <div>
            <h2>{{ 'welcome.adminTitle' | translate }}</h2>
            <p>{{ 'welcome.adminDescription' | translate }}</p>
          </div>

        </div>

        <span class="role-arrow">→</span>
      </button>
    </div>

    <button
      class="language-toggle"
      type="button"
      [class.language-toggle--es]="currentLanguage === 'es'"
      (click)="toggleLanguage()"
    >
      <span class="language-toggle__thumb"></span>
      <span class="language-toggle__option">EN</span>
      <span class="language-toggle__option">ES</span>
      <i class="bi bi-translate"></i>
    </button>

  </div>

</app-auth-layout>
